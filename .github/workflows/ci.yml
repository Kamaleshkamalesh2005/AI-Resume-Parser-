name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Ensure imports resolve correctly for backend/app/* when running tools from repo root
  PYTHONPATH: ${{ github.workspace }}/backend

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Lint + Type-check + Test
  # ────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies (backend)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install mypy pytest pytest-cov
          python -m spacy download en_core_web_sm

      - name: Type check (mypy) - non-blocking
        run: mypy backend/app --ignore-missing-imports --no-strict-optional || true

      - name: Test (pytest)
        run: |
          pytest tests/ \
            --cov=backend/app \
            --cov-report=term-missing \
            -q

  # ────────────────────────────────────────────────────────────
  # 2. Deploy (Railway / Render)
  # ────────────────────────────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      # ── Option A: Railway ───────────────────────────────────
      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --detach

      # ── Option B: Render ────────────────────────────────────
      - name: Deploy to Render
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -sf "$RENDER_DEPLOY_HOOK"
