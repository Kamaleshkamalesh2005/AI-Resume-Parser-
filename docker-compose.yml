services:
  # ── Flask + Gunicorn ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-matcher-app
    env_file: .env
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - RATELIMIT_STORAGE_URI=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-matcher}:${POSTGRES_PASSWORD:-matcher}@postgres:5432/${POSTGRES_DB:-resume_matcher}
      - PREWARM_MODELS=true
      - SBERT_QUANTIZED=false
      - GUNICORN_WORKERS=4
      - GUNICORN_TIMEOUT=120
    volumes:
      - uploads_data:/app/uploads
      - models_data:/app/models
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Celery worker ─────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-matcher-worker
    env_file: .env
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-matcher}:${POSTGRES_PASSWORD:-matcher}@postgres:5432/${POSTGRES_DB:-resume_matcher}
      - PREWARM_MODELS=true
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    volumes:
      - models_data:/app/models
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: resume-matcher-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-matcher}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-matcher}
      - POSTGRES_DB=${POSTGRES_DB:-resume_matcher}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matcher}"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Redis (rate-limiting + caching + Celery broker) ──────
  redis:
    image: redis:7-alpine
    container_name: resume-matcher-redis
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Nginx reverse proxy ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: resume-matcher-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads_data:
  models_data:
  logs_data:
  redis_data:
  postgres_data:
